<div class="page-bg">
  <div class="register-container">
    <h2>Registration</h2>

    <form #regForm="ngForm" (ngSubmit)="onSubmit(regForm)" novalidate>

      <!-- Farmer Name -->
      <div class="form-group" [class.has-error]="username.invalid && username.touched">
        <label>Name *</label>
        <div class="input-wrapper">
          <span class="material-icons field-icon">person</span>
          <input type="text" name="username" required [(ngModel)]="faremer.username" #username="ngModel"
            placeholder="Enter farmer name" (input)="onNameStateCityInput($event,'username')">
          <span class="error-icon" *ngIf="username.invalid && username.touched">⚠</span>
        </div>
        <p class="error-text" *ngIf="username.invalid && username.touched">
          Please enter only letters and spaces
        </p>
      </div>

      <!-- User Type -->
      <div class="form-group user-type-group">
        <label>User Type *</label>
        <div class="input-wrapper">
          <span class="material-icons field-icon">group</span>
          <select name="userType" class="user-type-select" [(ngModel)]="faremer.role" required #role="ngModel">
            <option value="" disabled selected>Select user type</option>
            <option value="farmer">Farmer</option>
            <option value="customer">Customer</option>
          </select>
        </div>
        <p class="error-text" *ngIf="role.invalid && (role.touched || regForm.submitted)">
          Please select user type
        </p>

      </div>

      <!-- Email -->
      <div class="form-group" [class.has-error]="email.invalid && email.touched">
        <label>Email *</label>
        <div class="input-wrapper">
          <span class="material-icons field-icon">email</span>
          <input type="email" name="email" required [(ngModel)]="faremer.email" #email="ngModel"
            placeholder="Enter email" (input)="onEmailInput($event)">
          <span class="error-icon" *ngIf="email.invalid && email.touched">⚠</span>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group" [class.has-error]="password.invalid && password.touched">
        <label>Password *</label>

        <div class="input-wrapper">
          <span class="material-icons field-icon">lock</span>

          <input [type]="showPassword ? 'text' : 'password'" name="password" required minlength="6"
            [(ngModel)]="faremer.password" #password="ngModel" placeholder="Enter password">

          <!-- ONLY ONE eye icon -->
          <!-- <span class="material-icons" (click)="togglePassword()" style="
        position:absolute;
        right:12px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        color:#3e7d32;
      ">
            {{ showPassword ? 'visibility_off' : 'visibility' }}
          </span> -->
        </div>

        <p class="error-text" *ngIf="password.invalid && password.touched">
          Password must be at least 6 characters
        </p>
      </div>


      <!-- Phone -->
      <div class="form-group" [class.has-error]="phone.invalid && phone.touched">
        <label>Mobile Number *</label>
        <div class="input-wrapper">
          <span class="material-icons field-icon">phone</span>
          <input type="tel" name="phone" required pattern="[0-9]{10}" [(ngModel)]="faremer.phoneno" #phone="ngModel"
            placeholder="Enter mobile number" (input)="onPhoneInput($event)">
          <p class="error-text" *ngIf="phone.invalid && phone.touched">
            Mobile number must be exactly 10 digits
          </p>
        </div>
      </div>

      <!-- Address -->
      <div class="form-group">
        <label>Farm Address *</label>
        <div class="input-wrapper">
          <span class="material-icons field-icon">home</span>
          <textarea name="address" required [(ngModel)]="faremer.address" placeholder="Enter farm address"></textarea>
        </div>
      </div>

      <!-- State & City -->
      <div class="row">
        <div class="form-group">
          <label>State *</label>
          <div class="input-wrapper">
            <span class="material-icons field-icon">map</span>
            <input type="text" name="state" required [(ngModel)]="faremer.state"
              (input)="onNameStateCityInput($event,'state')">
          </div>
        </div>

        <div class="form-group">
          <label>City *</label>
          <div class="input-wrapper">
            <span class="material-icons field-icon">location_city</span>
            <input type="text" name="city" required [(ngModel)]="faremer.city"
              (input)="onNameStateCityInput($event,'city')">
          </div>
        </div>
      </div>

      <!-- Aadhar Upload -->
      <div class="row upload-row">

        <!-- Aadhar Front -->
        <div class="upload-box" [class.has-error]="!farmerAdhar">
          <span class="material-icons upload-icon">badge</span>
          <p>Aadhar Front *</p>
          <input type="file" accept="image/*" (change)="onFileChange($event,'aadharFront')">
          <img *ngIf="aadharFrontPreview" [src]="aadharFrontPreview" width="120" height="120">
        </div>

        <!-- Aadhar Back -->
        <div class="upload-box" [class.has-error]="!farmerAdharback">
          <span class="material-icons upload-icon">badge</span>
          <p>Aadhar Back *</p>
          <input type="file" accept="image/*" (change)="onFileChange($event,'aadharBack')">
          <img *ngIf="aadharBackPreview" [src]="aadharBackPreview" width="120" height="120">
        </div>

      </div>

      <button type="submit" class="btn-primary">
        Register Farmer
      </button>

    </form>
  </div>
</div>
