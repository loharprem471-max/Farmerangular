<div class="layout">

    <!-- LEFT SIDEBAR -->
    <aside class="sidebar" [class.closed]="isSidebarClosed">
        <div class="sidebar-header">
            <i class="fa-solid fa-leaf"></i>
            <span>Farmer-Connect</span>
        </div>

        <nav class="sidebar-menu">

            <a routerLink="/admin/viewfarmers" routerLinkActive="active-link" (click)="closeSidebar()">
                <i class="fa-solid fa-wheat-awn"></i> Farmers
            </a>
            <a routerLink="/admin/viewcustomer" routerLinkActive="active-link" (click)="closeSidebar()">
                <i class="fa-solid fa-users"></i> Customers
            </a>
            <a routerLink="/admin/viewproduct" routerLinkActive="active-link" (click)="closeSidebar()">
                <i class="fa-solid fa-box-open"></i> Products
            </a>
            <a routerLink="/admin/message" routerLinkActive="active-link" (click)="closeSidebar()">
                <i class="fa-solid fa-file-invoice-dollar"></i> Requests
            </a>
            <a routerLink="/admin/newcustomers" routerLinkActive="active-link" (click)="closeSidebar()">
                <i class="fa-solid fa-user-plus"></i> New Customers
            </a>
            <a routerLink="/admin/newuser" routerLinkActive="active-link" (click)="closeSidebar()">
                <i class="fa-solid fa-user-plus"></i> New Farmers
            </a>
            <a (click)="logout()">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </a>

        </nav>
    </aside>

    <!-- MAIN DASHBOARD (YOUR ORIGINAL CODE) -->
    <div class="dashboard-container">

        <header class="dashboard-header">
            <button class="menu-toggle" (click)="toggleSidebar()">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="header-text">
                <h1>Admin Dashboard</h1>
                <p>Welcome back, Administrator</p>
            </div>

            <div class="stats-summary">
                <span class="status-badge">System Live</span>
            </div>
        </header>
        <router-outlet></router-outlet>
