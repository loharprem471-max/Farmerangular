<div class="history-container" *ngFor="let item of junctionList">

    <div class="history-card">

        <!-- Image -->
        <div class="history-image">
            <img [src]="item.image" alt="image">
        </div>

        <!-- Center Details -->
        <div class="history-details">
            <h3>{{ item.juncname }}</h3>
            <p>{{ item.description }}</p>
        </div>

        <!-- Right Section -->
        <div class="history-info">
            <div class="info-top">
                <!-- <p class="price">₹ {{ item.cost }}</p> -->
                <p class="date">{{ item.datetime | date:'yyyy-MM-dd HH:mm' }}</p>
            </div>

            <button class="delete-btn" (click)="deleteHistory(item.jid)">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>

    </div>
</div>
